image: python:3.12

stages:
  - lint
  - build

include:
  - project: "GNOME/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"

.vars:
  variables:
    MANIFEST_PATH: build-aux/dev.geopjr.Calligraphy.Devel.json
    FLATPAK_MODULE: calligraphy
    APP_ID: dev.geopjr.Calligraphy
    RUNTIME_REPO: https://nightly.gnome.org/gnome-nightly.flatpakrepo
    BUNDLE: dev.geopjr.Calligraphy.Devel.flatpak

pre-commit:
  stage: lint
  script:
    - pip install pre-commit --quiet
    - pre-commit run --all-files

# Build Flatpak for x86_64
flatpak@x86_64:
  stage: build
  extends:
    - .flatpak@x86_64
    - .vars

# Build Flatpak for aarch64
flatpak@aarch64:
  stage: build
  extends:
    - .flatpak@aarch64
    - .vars
