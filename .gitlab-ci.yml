image: python:3.12

include:
  - project: "GNOME/citemplates"
    file: "flatpak/flatpak_ci_initiative.yml"

.vars:
  variables:
    MANIFEST_PATH: io.gitlab.gregorni.Calligraphy.json
    FLATPAK_MODULE: calligraphy
    APP_ID: io.gitlab.gregorni.Calligraphy
    RUNTIME_REPO: https://nightly.gnome.org/gnome-nightly.flatpakrepo
    BUNDLE: calligraphy.flatpak

# Build Flatpak for x86_64
flatpak@x86_64:
  stage: build
  extends:
    - .flatpak@x86_64
    - .vars

# Build Flatpak for aarch64
flatpak@aarch64:
  stage: build
  extends:
    - .flatpak@aarch64
    - .vars

# Linter enforcing black coding style
black:
  script:
    - pip install black --quiet
    - black --check --diff src/

# Sorting imports
isort:
  script:
    - pip install isort --quiet
    - isort --check --diff src/ --profile black

# Removing unused imports
unimport:
  script:
    - pip install unimport --quiet
    - unimport --check --diff src/

# Checking for typos
codespell:
  script:
    - pip install codespell --quiet
    - codespell --skip po
